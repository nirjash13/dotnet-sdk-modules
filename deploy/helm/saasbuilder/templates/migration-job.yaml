{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "saasbuilder.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "saasbuilder.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    # Run before new pods are scheduled (Helm pre-upgrade / pre-install hook)
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.migration.backoffLimit | default 3 }}
  template:
    metadata:
      labels:
        {{- include "saasbuilder.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "saasbuilder.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # The migration command acquires a Postgres advisory lock so only one pod
          # runs migrations during rolling deployments (Phase 3 migration runner).
          command: ["dotnet", "SaasBuilder.Sample.Host.dll", "--migrate-only"]
          envFrom:
            - configMapRef:
                name: {{ include "saasbuilder.fullname" . }}-config
          env:
            {{- if .Values.envSecrets.secretName }}
            {{- range .Values.envSecrets.keys }}
            - name: {{ . }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.envSecrets.secretName }}
                  key: {{ . }}
            {{- end }}
            {{- end }}
          resources:
            limits:
              cpu: "500m"
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
{{- end }}
