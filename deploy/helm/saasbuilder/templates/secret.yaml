#
# To create the secret manually (dev/testing only):
#   kubectl create secret generic saasbuilder-secrets \
#     --from-literal=ConnectionStrings__DefaultConnection="..." \
#     --from-literal=Jwt__Secret="..." \
#     --from-literal=Stripe__SecretKey="..."
#
# Required keys:
{{- range .Values.envSecrets.keys }}
#   - {{ . }}
{{- end }}
{{- end }}
