# secrets.example.yaml — copy to secrets.yaml and fill in real values.
# secrets.yaml is listed in .gitignore and must NEVER be committed to source control.
#
# Usage:
#   helm install saasbuilder deploy/helm/saasbuilder --values secrets.yaml

# In-cluster PostgreSQL (bitnami/postgresql dependency).
# Set to false and provide ConnectionStrings__Default below for external Postgres.
postgresql:
  enabled: true
  auth:
    # Password for the in-cluster Postgres instance.
    password: "REPLACE_ME"

# Environment variables injected as a Kubernetes Secret into the app container.
# These override appsettings.json values via .NET Configuration's env-var binding.
env:
  # JWT signing key — minimum 32 characters.
  Jwt__Secret: "REPLACE_ME_minimum_32_chars"

  # External Postgres connection string (used when postgresql.enabled=false).
  # ConnectionStrings__Default: "Host=db.example.com;Port=5432;Database=saasbuilder;Username=saas;Password=REPLACE_ME"

  # Stripe webhook secret (starts with whsec_).
  Billing__Stripe__WebhookSecret: "whsec_REPLACE_ME"

  # Stripe API key.
  Billing__Stripe__ApiKey: "sk_live_REPLACE_ME"
