name: Load Test Gate (Steady-State)

on:
  push:
    branches:
      - main

concurrency:
  group: load-test-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  load-test:
    name: k6 Steady-State (5m CI variant)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Install k6 ────────────────────────────────────────────────────────
      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -q
          sudo apt-get install -y k6

      # ── Spin up ephemeral observability stack ─────────────────────────────
      - name: Start observability stack
        working-directory: deploy
        run: docker compose up -d

      # ── Wait for Chassis host readiness ───────────────────────────────────
      # The chassis host is started by docker compose; wait until /health returns 200.
      - name: Wait for chassis host
        run: |
          echo "Waiting for chassis host to become ready..."
          MAX_WAIT=120
          ELAPSED=0
          until curl -sf http://localhost:5000/health > /dev/null 2>&1; do
            if [ $ELAPSED -ge $MAX_WAIT ]; then
              echo "ERROR: Chassis host did not become ready within ${MAX_WAIT}s"
              docker compose -f deploy/docker-compose.yml logs
              exit 1
            fi
            echo "  Still waiting... (${ELAPSED}s elapsed)"
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done
          echo "Chassis host is ready after ${ELAPSED}s."

      # ── Run k6 steady-state (5m CI variant) ──────────────────────────────
      - name: Run k6 steady-state (5m CI variant)
        env:
          BASE_URL: http://localhost:5000
          TENANT_ID: 00000000-0000-0000-0000-000000000001
          CLIENT_ID: chassis-loadtest
          CLIENT_SECRET: chassis-loadtest-secret
          TEST_RUN_ID: ci-${{ github.sha }}
        run: |
          # Run the steady-state scenario with a shortened 5-minute duration for CI budget.
          # The full 15-minute scenario runs nightly (see load-test-nightly.yml).
          # --out: writes k6 metrics to Prometheus remote-write receiver.
          # --summary-export: produces JSON summary for threshold parsing below.
          k6 run loadtests/k6/scenarios/steady.js \
            --duration 5m \
            --out experimental-prometheus-rw=http://localhost:9090/api/v1/write \
            --tag test_run_id=${TEST_RUN_ID} \
            --summary-export /tmp/k6-summary.json \
            --env BASE_URL=${BASE_URL} \
            --env TENANT_ID=${TENANT_ID} \
            --env CLIENT_ID=${CLIENT_ID} \
            --env CLIENT_SECRET=${CLIENT_SECRET} \
            --env TEST_RUN_ID=${TEST_RUN_ID}

      # ── Parse summary and fail if any threshold breached ─────────────────
      - name: Parse k6 summary and check thresholds
        run: |
          python3 - <<'PYEOF'
          import json, sys

          with open("/tmp/k6-summary.json") as f:
              summary = json.load(f)

          thresholds = summary.get("thresholds", {})
          if not thresholds:
              print("WARNING: No thresholds found in k6 summary. k6 version may not support --summary-export.")
              sys.exit(0)

          failures = []
          for name, data in thresholds.items():
              if not data.get("ok", True):
                  failures.append(f"  BREACHED: {name}")

          if failures:
              print("k6 threshold breaches detected — build FAILED:")
              for f in failures:
                  print(f)
              sys.exit(1)
          else:
              print(f"All {len(thresholds)} k6 thresholds passed.")
          PYEOF

      # ── Upload k6 summary artifact ─────────────────────────────────────────
      - name: Upload k6 summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-summary-${{ github.sha }}
          path: /tmp/k6-summary.json
          retention-days: 30

      # ── Tear down stack ───────────────────────────────────────────────────
      - name: Tear down observability stack
        if: always()
        working-directory: deploy
        run: docker compose down -v
