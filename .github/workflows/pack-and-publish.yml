name: Pack and Publish

on:
  push:
    branches:
      - main

jobs:
  pack-and-publish:
    name: Pack and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # MinVer requires full history to read git tags

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.103"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --no-restore --configuration Release -warnaserror

      - name: Pack
        run: dotnet pack --no-build --configuration Release --output ./artifacts

      - name: List artifacts
        run: ls -la ./artifacts/

      - name: Check publish credentials
        id: creds
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          NUGET_FEED_URL: ${{ vars.NUGET_FEED_URL }}
        run: |
          if [ -n "$NUGET_API_KEY" ] && [ -n "$NUGET_FEED_URL" ]; then
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
            echo "::notice::NUGET_FEED_URL var or NUGET_API_KEY secret not set — skipping publish."
          fi

      - name: Publish to internal feed
        if: steps.creds.outputs.has_creds == 'true'
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --source "${{ vars.NUGET_FEED_URL }}"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --skip-duplicate
