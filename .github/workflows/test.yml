name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    # Tests require the build job to succeed first, but we allow the test job
    # to continue even if no test projects are found (Phase 0 has no xUnit projects yet).

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.103"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        # continue-on-error: Phase 0 has no xUnit test projects — the test job is
        # established here for the pipeline infrastructure; actual test execution will
        # be introduced in Phase 1+. Remove continue-on-error once xUnit projects exist.
        continue-on-error: true
        run: >
          dotnet test
          --no-build
          --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory ./test-results

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: ./test-results/**/*.xml
          if-no-files-found: ignore
