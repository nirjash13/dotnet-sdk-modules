name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Job 1: Architecture tests ──────────────────────────────────────────────────────
  # Runs on every push. Does NOT require Docker. Blocks PRs that violate layer rules.
  architecture:
    name: Architecture Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.103"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Architecture Tests
        run: >
          dotnet test tests/Chassis.ArchitectureTests
          --no-build
          --configuration Release
          --logger trx
          --results-directory ./test-results/architecture

      - name: Upload architecture test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-results-${{ github.run_id }}
          path: ./test-results/architecture/**/*.trx
          if-no-files-found: ignore

  # ── Job 2: Security tests ──────────────────────────────────────────────────────────
  # Requires Docker (Testcontainers). ubuntu-latest provides Docker via dind mode.
  security:
    name: Security Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.103"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Security Tests
        run: >
          dotnet test tests/Chassis.SecurityTests
          --no-build
          --configuration Release
          --logger trx
          --results-directory ./test-results/security

      - name: Upload security test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-results-${{ github.run_id }}
          path: ./test-results/security/**/*.trx
          if-no-files-found: ignore

  # ── Job 3: All other tests (integration, package smoke tests) ─────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.103"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test
          --no-build
          --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory ./test-results

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: ./test-results/**/*.xml
          if-no-files-found: ignore
