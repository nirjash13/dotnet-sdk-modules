<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SaasBuilder Starter</title>
    <base href="/" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;">
            Loading SaasBuilder...
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">&#10006;</a>
    </div>

    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        // Expose token storage helpers to Blazor via JS interop
        window.saasBuilderStorage = {
            setToken: (key, value) => sessionStorage.setItem(key, value),
            getToken: (key) => sessionStorage.getItem(key),
            removeToken: (key) => sessionStorage.removeItem(key),
        };

        // C-26 FIX: Structured CSS variable helper replaces the eval()-based approach
        // in BrandingService. The color value is validated by a regex allowlist before
        // being applied — this prevents XSS via tenant-controlled color strings.
        window.saasBuilderBranding = {
            setCssVar: function (name, value) {
                // Accept only: #RGB, #RRGGBB, #RRGGBBAA (hex), or CSS named colors (alpha-only)
                var hexPattern = /^#[0-9a-fA-F]{3,8}$/;
                var namedPattern = /^[a-zA-Z]{2,30}$/;
                if (!hexPattern.test(value) && !namedPattern.test(value)) {
                    console.warn('saasBuilderBranding.setCssVar: rejected unsafe color value for ' + name);
                    return;
                }
                document.documentElement.style.setProperty(name, value);
            }
        };
    </script>
</body>
</html>
